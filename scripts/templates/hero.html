<section class="hero {{hero_image_class}}" {{hero_style}} aria-labelledby="hero-heading">
  {{hero_overlay}}
  <div class="hero-content container">
    {{badge_html}}
    <h1 id="hero-heading" class="hero-heading reveal-item">{{headline}}</h1>
    <p class="hero-sub reveal-item">{{subheadline}}</p>
    <div class="hero-actions reveal-item">
      <a href="#contacto" class="btn btn-primary btn-lg">{{cta_primary}}</a>
      {{cta_secondary_html}}
    </div>
    {{trust_html}}
  </div>
</section>
