<section class="cta-section" id="contacto" aria-labelledby="cta-heading" style="background:{{cta_bg}}">
  {{cta_image_overlay}}
  <div class="container cta-content">
    <h2 id="cta-heading" class="cta-heading reveal-item">{{cta_headline}}</h2>
    <p class="cta-sub reveal-item">{{cta_subtext}}</p>
    <div class="cta-actions reveal-item">
      <a href="mailto:{{contact_email}}" class="btn btn-white btn-lg">{{cta_button_text}}</a>
      {{phone_html}}
    </div>
  </div>
</section>
