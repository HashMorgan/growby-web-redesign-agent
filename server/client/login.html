<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrowBy Redesign Agent — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:      #5D55D7;
      --purple-dark: #4a43c4;
      --purple-glow: rgba(93,85,215,0.35);
      --bg:          #03081B;
      --surface:     #0d1424;
      --border:      rgba(255,255,255,0.08);
      --text:        #e8eaf0;
      --muted:       rgba(255,255,255,0.45);
      --error:       #f87171;
      --success:     #34d399;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Subtle grid pattern */
      background-image:
        linear-gradient(rgba(93,85,215,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(93,85,215,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    /* Logo above card */
    .logo-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--purple), #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.15rem;
      color: #fff;
      box-shadow: 0 4px 20px var(--purple-glow);
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    /* Card */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4), 0 0 0 1px var(--border);
    }

    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .login-card .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Form fields */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-glow);
    }

    .field input::placeholder { color: var(--muted); }

    /* Password wrapper with toggle */
    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 44px;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 4px;
      transition: color 0.2s;
      line-height: 1;
    }
    .toggle-pw:hover { color: var(--text); }

    /* Submit button */
    #btn-login {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: var(--purple);
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px var(--purple-glow);
    }

    #btn-login:hover:not(:disabled) {
      background: var(--purple-dark);
      box-shadow: 0 6px 24px var(--purple-glow);
    }

    #btn-login:active:not(:disabled) {
      transform: scale(0.98);
    }

    #btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error message */
    #error-msg {
      min-height: 20px;
      margin-top: 14px;
      font-size: 0.84rem;
      color: var(--error);
      text-align: center;
      font-weight: 500;
    }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }
    .shake { animation: shake 0.45s ease; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<div class="login-wrapper">

  <div class="logo-header">
    <div class="logo-icon">G</div>
    <span class="logo-text">GrowBy</span>
  </div>

  <div class="login-card" id="login-card">
    <h1>Redesign Agent</h1>
    <p class="subtitle">Acceso interno GrowBy</p>

    <form id="login-form" autocomplete="on" novalidate>
      <div class="field">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          placeholder="growby"
          required
        >
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••••••"
            required
          >
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Mostrar contraseña">
            👁
          </button>
        </div>
      </div>

      <button type="submit" id="btn-login">
        <span class="spinner" id="spinner"></span>
        <span id="btn-text">Ingresar</span>
      </button>

      <p id="error-msg" role="alert" aria-live="polite"></p>
    </form>
  </div>

  <p class="login-footer">GrowBy · Uso interno exclusivo</p>
</div>

<script>
  // Password toggle
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const btn = document.getElementById('toggle-pw');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.textContent = '🙈';
      btn.setAttribute('aria-label', 'Ocultar contraseña');
    } else {
      pw.type = 'password';
      btn.textContent = '👁';
      btn.setAttribute('aria-label', 'Mostrar contraseña');
    }
  });

  // Login form
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn      = document.getElementById('btn-login');
    const spinner  = document.getElementById('spinner');
    const btnText  = document.getElementById('btn-text');
    const errorMsg = document.getElementById('error-msg');
    const card     = document.getElementById('login-card');

    // Loading state
    btn.disabled  = true;
    btn.classList.add('loading');
    spinner.style.display = 'block';
    btnText.textContent   = 'Ingresando...';
    errorMsg.textContent  = '';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        }),
        credentials: 'same-origin',
      });

      if (res.ok) {
        btnText.textContent = '✓ Acceso concedido';
        setTimeout(() => { window.location.href = '/'; }, 300);
        return;
      }

      const data = await res.json().catch(() => ({}));

      // Rate limit
      if (res.status === 429) {
        errorMsg.textContent = data.error || 'Demasiados intentos. Espera 15 minutos.';
      } else {
        errorMsg.textContent = data.error || 'Credenciales incorrectas';
      }

      // Shake card
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 500);

    } catch (_) {
      errorMsg.textContent = 'Error de red. Verifica tu conexión.';
    }

    // Reset button
    btn.disabled = false;
    btn.classList.remove('loading');
    spinner.style.display = 'none';
    btnText.textContent   = 'Ingresar';
  });
</script>
</body>
</html>
