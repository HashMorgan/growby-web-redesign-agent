<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Rediseños — GrowBy Agents</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/webp" sizes="32x32" href="/isotipo-32.webp">
  <link rel="stylesheet" href="/agents/web-redesign/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .redesign-card {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(93, 85, 215, 0.15);
      border-radius: 1rem;
      padding: 1.5rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .redesign-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #5D55D7, #FFCC00);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .redesign-card:hover {
      border-color: rgba(93, 85, 215, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(93, 85, 215, 0.15);
    }

    .redesign-card:hover::before {
      opacity: 1;
    }

    .favicon-wrapper {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(93, 85, 215, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .favicon-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .favicon-wrapper.fallback {
      background: linear-gradient(135deg, #5D55D7, #4a44b0);
      color: white;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.025em;
    }

    .badge-stitch {
      background: rgba(93, 85, 215, 0.15);
      color: #A5A0F0;
      border: 1px solid rgba(93, 85, 215, 0.3);
    }

    .badge-pipeline {
      background: rgba(255, 204, 0, 0.15);
      color: #FFCC00;
      border: 1px solid rgba(255, 204, 0, 0.3);
    }

    .badge-active {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .badge-inactive {
      background: rgba(156, 163, 175, 0.15);
      color: #9ca3af;
      border: 1px solid rgba(156, 163, 175, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #9ca3af;
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .loading-skeleton {
      background: linear-gradient(
        90deg,
        rgba(31, 41, 55, 0.5) 25%,
        rgba(55, 65, 81, 0.5) 50%,
        rgba(31, 41, 55, 0.5) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 0.5rem;
      height: 1rem;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="border-b border-gray-800 bg-[#03081B] sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <a href="/web-redesign" class="text-sm text-gray-400 hover:text-[#5D55D7] transition flex items-center gap-2">
            ← Volver al agente
          </a>
          <div class="h-4 w-px bg-gray-700"></div>
          <h1 class="text-lg sm:text-xl font-semibold">📋 Mis Rediseños</h1>
        </div>

        <div class="flex items-center gap-3">
          <span id="totalCount" class="text-sm text-gray-400">
            <span class="loading-skeleton" style="width: 60px; display: inline-block;"></span>
          </span>
          <div class="flex items-center gap-2">
            <span id="userBadge" class="text-xs sm:text-sm text-gray-400 flex items-center gap-1">
              <span>👤</span><span id="usernameDisplay"></span>
            </span>
            <button id="logoutBtn"
              class="text-xs sm:text-sm text-gray-500 hover:text-red-400 transition px-2 py-1 rounded"
              title="Cerrar sesión">
              Salir
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
    <!-- Loading State -->
    <div id="loadingState" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="redesign-card" style="min-height: 200px;">
        <div class="loading-skeleton mb-4"></div>
        <div class="loading-skeleton mb-2" style="width: 70%;"></div>
        <div class="loading-skeleton" style="width: 50%;"></div>
      </div>
      <div class="redesign-card" style="min-height: 200px;">
        <div class="loading-skeleton mb-4"></div>
        <div class="loading-skeleton mb-2" style="width: 70%;"></div>
        <div class="loading-skeleton" style="width: 50%;"></div>
      </div>
      <div class="redesign-card hidden lg:block" style="min-height: 200px;">
        <div class="loading-skeleton mb-4"></div>
        <div class="loading-skeleton mb-2" style="width: 70%;"></div>
        <div class="loading-skeleton" style="width: 50%;"></div>
      </div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden empty-state">
      <div class="empty-state-icon">📦</div>
      <h2 class="text-2xl font-bold text-gray-300 mb-2">No hay rediseños aún</h2>
      <p class="text-gray-500 mb-6">Genera tu primer rediseño para verlo aquí</p>
      <a href="/web-redesign" class="inline-block px-6 py-3 bg-[#5D55D7] hover:bg-[#4a44b0] rounded-lg text-white font-medium transition">
        Generar Rediseño
      </a>
    </div>

    <!-- Redesigns Grid -->
    <div id="redesignsGrid" class="hidden grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Cards will be injected here -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-800 mt-16">
    <div class="max-w-7xl mx-auto px-6 py-6 text-center text-sm text-gray-500">
      GrowBy Redesign Agent · <a href="https://growby.tech" target="_blank" class="hover:text-[#5D55D7]">growby.tech</a>
    </div>
  </footer>

  <script>
    // Auth
    (async () => {
      try {
        const me = await fetch('/api/auth/me', { credentials: 'same-origin' });
        if (!me.ok) { window.location.href = '/login'; return; }
        const { username } = await me.json();
        const el = document.getElementById('usernameDisplay');
        if (el) el.textContent = username;
      } catch (_) { window.location.href = '/login'; }
    })();

    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
      window.location.href = '/login';
    });

    // Toast Manager
    class ToastManager {
      constructor() {
        this.container = this.createContainer();
      }

      createContainer() {
        let container = document.getElementById('toastContainer');
        if (!container) {
          container = document.createElement('div');
          container.id = 'toastContainer';
          container.className = 'toast-container';
          document.body.appendChild(container);
        }
        return container;
      }

      show(message, type = 'info', duration = 3000) {
        const icons = { success: '✅', error: '❌', info: 'ℹ️' };
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
          <div class="toast-icon">${icons[type]}</div>
          <div class="toast-message">${message}</div>
          <button class="toast-close" onclick="this.parentElement.remove()">×</button>
        `;
        this.container.appendChild(toast);
        if (duration > 0) {
          setTimeout(() => {
            toast.style.animation = 'slideIn 0.3s ease reverse';
            setTimeout(() => toast.remove(), 300);
          }, duration);
        }
      }

      success(msg, dur) { this.show(msg, 'success', dur); }
      error(msg, dur) { this.show(msg, 'error', dur); }
    }

    const toast = new ToastManager();

    // Load redesigns
    async function loadRedesigns() {
      try {
        const response = await fetch('/web-redesign/api/history');
        if (!response.ok) throw new Error('Error al cargar historial');

        const data = await response.json();
        const redesigns = data.redesigns || [];

        // Hide loading
        document.getElementById('loadingState').classList.add('hidden');

        if (redesigns.length === 0) {
          document.getElementById('emptyState').classList.remove('hidden');
          document.getElementById('totalCount').textContent = '0 rediseños';
          return;
        }

        // Show grid
        document.getElementById('redesignsGrid').classList.remove('hidden');
        document.getElementById('totalCount').textContent = `${redesigns.length} rediseño${redesigns.length === 1 ? '' : 's'}`;

        // Render cards
        const grid = document.getElementById('redesignsGrid');
        grid.innerHTML = redesigns.map(r => createRedesignCard(r)).join('');

        // Add event listeners
        redesigns.forEach((r, i) => {
          const card = grid.children[i];

          card.querySelector('.view-btn')?.addEventListener('click', () => {
            if (r.netlifyUrl) {
              window.open(r.netlifyUrl, '_blank', 'noopener,noreferrer');
            } else {
              toast.error('URL no disponible');
            }
          });

          card.querySelector('.copy-btn')?.addEventListener('click', async () => {
            if (!r.netlifyUrl) {
              toast.error('URL no disponible');
              return;
            }
            const fullUrl = r.netlifyUrl.startsWith('http')
              ? r.netlifyUrl
              : window.location.origin + r.netlifyUrl;
            try {
              await navigator.clipboard.writeText(fullUrl);
              toast.success('URL copiada', 2000);
            } catch (_) {
              toast.error('Error al copiar');
            }
          });
        });

        // Check active status (async)
        redesigns.forEach((r, i) => {
          if (r.netlifyUrl && r.netlifyUrl.startsWith('http')) {
            checkUrlStatus(r.netlifyUrl, i);
          }
        });

      } catch (error) {
        console.error('Error loading redesigns:', error);
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
        toast.error('Error al cargar el historial');
      }
    }

    function createRedesignCard(redesign) {
      const date = new Date(redesign.timestamp);
      const formattedDate = date.toLocaleDateString('es-PE', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      });
      const formattedTime = date.toLocaleTimeString('es-PE', {
        hour: '2-digit',
        minute: '2-digit'
      });

      // Extract domain from URL
      const domain = redesign.url ? new URL(redesign.url).hostname.replace('www.', '') : 'Cliente';
      const firstLetter = domain.charAt(0).toUpperCase();

      // Favicon URL
      const faviconUrl = redesign.url ? `https://www.google.com/s2/favicons?domain=${redesign.url}&sz=64` : null;

      // Method badge
      const methodBadge = redesign.method === 'stitch'
        ? '<span class="badge badge-stitch">🎨 Stitch AI</span>'
        : redesign.method === 'pipeline'
          ? '<span class="badge badge-pipeline">⚡ Pipeline</span>'
          : '<span class="badge badge-inactive">Unknown</span>';

      return `
        <div class="redesign-card">
          <div class="flex items-start gap-4 mb-4">
            <div class="favicon-wrapper ${!faviconUrl ? 'fallback' : ''}" id="favicon-${redesign.jobId}">
              ${faviconUrl
                ? `<img src="${faviconUrl}" alt="${domain}" onerror="this.parentElement.innerHTML='${firstLetter}'">`
                : firstLetter
              }
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="text-lg font-semibold text-white mb-1 truncate">${domain}</h3>
              <a href="${redesign.url}" target="_blank" class="text-sm text-gray-400 hover:text-[#5D55D7] transition truncate block">
                ${redesign.url}
              </a>
            </div>
          </div>

          <div class="flex flex-wrap items-center gap-2 mb-3">
            ${methodBadge}
            <span class="badge badge-inactive" id="status-${redesign.jobId}">
              <span class="loading-skeleton" style="width: 40px; height: 8px;"></span>
            </span>
          </div>

          <div class="text-sm text-gray-500 mb-4">
            <div class="flex items-center gap-2 mb-1">
              <span>📅</span>
              <span>${formattedDate} · ${formattedTime}</span>
            </div>
            ${redesign.context ? `
              <div class="mt-2 text-xs text-gray-600 line-clamp-2">
                ${redesign.context}
              </div>
            ` : ''}
          </div>

          <div class="flex gap-2">
            <button class="view-btn flex-1 px-4 py-2 bg-[#5D55D7] hover:bg-[#4a44b0] rounded-lg text-white font-medium transition text-sm">
              Ver rediseño
            </button>
            <button class="copy-btn px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-gray-300 font-medium transition text-sm">
              📋
            </button>
          </div>
        </div>
      `;
    }

    async function checkUrlStatus(url, index) {
      try {
        const response = await fetch(url, { method: 'HEAD', mode: 'no-cors' });
        // no-cors doesn't give us status, so we assume it's active if no error
        updateStatusBadge(index, true);
      } catch (error) {
        // If error, assume inactive
        updateStatusBadge(index, false);
      }
    }

    function updateStatusBadge(index, isActive) {
      const badge = document.querySelectorAll('[id^="status-"]')[index];
      if (badge) {
        badge.className = `badge ${isActive ? 'badge-active' : 'badge-inactive'}`;
        badge.innerHTML = isActive ? '● Activo' : '○ Offline';
      }
    }

    // Load on page load
    loadRedesigns();
  </script>
</body>
</html>
